<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comande da Servire</title>

    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --success-light: #d4edda;
            --success-dark: #155724;
            --danger: #dc3545;
            --warning: #ffc107;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
            --border: #dee2e6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 15px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 18px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        h1 {
            text-align: center;
            margin: 0;
            color: var(--primary);
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: var(--gray);
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .top-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .status {
            flex: 1;
            min-width: 220px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            background: #e9ecef;
            color: #333;
        }

        .status.ready {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .refresh-button {
            width: auto;
            min-width: 180px;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }

        .refresh-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        thead {
            background: var(--dark);
            color: white;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            font-size: 15px;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #eef5ff;
        }

        tbody tr.servito {
            background: var(--success-light) !important;
            color: var(--success-dark);
            font-weight: bold;
        }

        tbody tr.servito:hover {
            background: #c3e6cb !important;
        }

        .progressivo {
            text-align: center;
            font-weight: bold;
            width: 60px;
        }

        .tavolo {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .azione {
            text-align: center;
            min-width: 120px;
        }

        .served-button {
            padding: 9px 12px;
            border: none;
            border-radius: 7px;
            background: var(--success);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .served-button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .empty-message {
            text-align: center;
            padding: 30px;
            color: var(--gray);
            font-size: 18px;
        }

        .small-info {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 12px;
        }

        @media (max-width: 700px) {
            body {
                padding: 8px;
            }

            .container {
                padding: 12px;
                border-radius: 8px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .refresh-button {
                width: 100%;
            }

            .status {
                width: 100%;
            }

            th,
            td {
                padding: 8px;
                font-size: 14px;
            }

            .tavolo {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Comande da Servire</h1>
    <div class="subtitle">Visualizzazione dati da Google Sheet</div>

    <div class="top-bar">
        <div id="status" class="status loading">Caricamento dati...</div>
        <button id="refreshButton" class="refresh-button">AGGIORNA ORA</button>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr>
                    <th class="progressivo">#</th>
                    <th>Timestamp</th>
                    <th>Data</th>
                    <th>Ora</th>
                    <th>Cliente</th>
                    <th>Cassa</th>
                    <th class="tavolo">Tavolo</th>
                    <th>Note</th>
                    <th>Servito alle</th>
                    <th class="azione">Azione</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="10" class="empty-message">Caricamento...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="small-info">
        Clicca sulla riga o sul pulsante SERVITO per segnare la comanda come servita.
    </div>
</div>

<script>
    /*
        URL della tua Web App Google Apps Script.
        Deve terminare con /exec.
    */
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOPC6hg6oA7Hh4LQhfjo64BBxM2lbH1TGsP6mQfcDMymfi0T6P6eXTZ8qZ3P9v7k61aA/exec";

    const statusBox = document.getElementById("status");
    const tableBody = document.getElementById("tableBody");
    const refreshButton = document.getElementById("refreshButton");

    let isLoading = false;
    let autoRefreshTimer = null;

    function setStatus(message, type) {
        statusBox.textContent = message;
        statusBox.className = "status " + type;
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    async function chiamaScript(payload) {
        const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(payload),
            redirect: "follow"
        });

        const rawResponse = await response.text();

        console.log("Risposta Apps Script:", rawResponse);

        let result;

        try {
            result = JSON.parse(rawResponse);
        } catch (error) {
            throw new Error("Risposta non JSON dallo script: " + rawResponse);
        }

        if (result.status === "error") {
            throw new Error(result.message || "Errore Apps Script.");
        }

        return result;
    }

    async function caricaTabella() {
        if (isLoading) return;

        isLoading = true;
        refreshButton.disabled = true;
        setStatus("Caricamento dati...", "loading");

        try {
            const result = await chiamaScript({
                action: "list"
            });

            renderTabella(result.rows || []);

            const now = new Date().toLocaleTimeString("it-IT");
            setStatus("Aggiornato alle " + now, "ready");

        } catch (error) {
            console.error("Errore caricamento tabella:", error);
            setStatus("Errore caricamento dati", "error");

            tableBody.innerHTML = `
                <tr>
                    <td colspan="10" class="empty-message">
                        Errore caricamento dati: ${escapeHtml(error.message)}
                    </td>
                </tr>
            `;

        } finally {
            isLoading = false;
            refreshButton.disabled = false;
        }
    }

    function renderTabella(rows) {
        tableBody.innerHTML = "";

        if (!rows || rows.length === 0) {
            tableBody.innerHTML = `
                <tr>
                    <td colspan="10" class="empty-message">
                        Nessuna comanda presente.
                    </td>
                </tr>
            `;
            return;
        }

        rows.forEach((row, index) => {
            const tr = document.createElement("tr");

            const servitoAlle = row.servitoAlle || "";
            const isServito = Boolean(servitoAlle);

            if (isServito) {
                tr.classList.add("servito");
            }

            tr.dataset.sheetRow = row.sheetRow;

            tr.innerHTML = `
                <td class="progressivo">${index + 1}</td>
                <td>${escapeHtml(row.timestamp)}</td>
                <td>${escapeHtml(row.data)}</td>
                <td>${escapeHtml(row.ora)}</td>
                <td>${escapeHtml(row.cliente)}</td>
                <td>${escapeHtml(row.cassa)}</td>
                <td class="tavolo">${escapeHtml(row.tavolo)}</td>
                <td>${escapeHtml(row.note)}</td>
                <td>${escapeHtml(servitoAlle)}</td>
                <td class="azione">
                    <button class="served-button" ${isServito ? "disabled" : ""}>
                        ${isServito ? "SERVITO" : "SERVITO"}
                    </button>
                </td>
            `;

            tr.addEventListener("click", async () => {
                await segnaServito(row, tr);
            });

            const button = tr.querySelector(".served-button");

            button.addEventListener("click", async (event) => {
                event.stopPropagation();
                await segnaServito(row, tr);
            });

            tableBody.appendChild(tr);
        });
    }

    async function segnaServito(row, trElement) {
        if (!row || !row.sheetRow) {
            alert("Errore: riga del foglio non riconosciuta.");
            return;
        }

        if (row.servitoAlle) {
            const conferma = confirm(
                "Questa comanda risulta già servita alle " + row.servitoAlle + ".\n\n" +
                "Vuoi aggiornare comunque l'orario?"
            );

            if (!conferma) {
                return;
            }
        }

        const confermaServito = confirm(
            "Confermi di segnare come servita la comanda del tavolo " +
            (row.tavolo || "") +
            "?"
        );

        if (!confermaServito) {
            return;
        }

        try {
            setStatus("Aggiornamento riga in corso...", "loading");

            const result = await chiamaScript({
                action: "serve",
                sheetRow: row.sheetRow
            });

            const oraServizio = result.servitoAlle || "";

            trElement.classList.add("servito");

            const cells = trElement.querySelectorAll("td");

            /*
                Colonne visualizzate:
                0 #,
                1 Timestamp,
                2 Data,
                3 Ora,
                4 Cliente,
                5 Cassa,
                6 Tavolo,
                7 Note,
                8 Servito alle,
                9 Azione
            */
            cells[8].textContent = oraServizio;

            const button = trElement.querySelector(".served-button");
            button.disabled = true;
            button.textContent = "SERVITO";

            row.servitoAlle = oraServizio;

            setStatus("Comanda segnata come servita alle " + oraServizio, "ready");

        } catch (error) {
            console.error("Errore aggiornamento servizio:", error);
            setStatus("Errore aggiornamento riga", "error");
            alert("Errore durante l'aggiornamento:\n\n" + error.message);
        }
    }

    refreshButton.addEventListener("click", caricaTabella);

    window.addEventListener("load", () => {
        caricaTabella();

        autoRefreshTimer = setInterval(() => {
            caricaTabella();
        }, 10000);
    });
</script>

</body>
</html>
