<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Tavoli Sagra</title>

    <meta name="theme-color" content="#007bff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="manifest" href="manifest.json">

    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 15px;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin: 0;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        #reader {
            width: 100%;
            min-height: 280px;
            background: #eeeeee;
            border: 2px dashed #cccccc;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .status.ready {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.sending {
            background: #fff3cd;
            color: #856404;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: var(--dark);
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        input:read-only {
            background: #f2f2f2;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .square-container {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .square-box {
            flex: 1;
            border: 2px solid #dddddd;
            border-radius: 12px;
            overflow: hidden;
            background: #fafafa;
        }

        .square-label {
            text-align: center;
            background: #eeeeee;
            padding: 8px;
            font-weight: bold;
        }

        .square-content {
            padding: 12px;
        }

        #table {
            text-align: center;
            font-size: 54px;
            font-weight: bold;
            height: 100px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #sendData {
            background: var(--success);
            color: white;
        }

        #newScan {
            background: var(--primary);
            color: white;
        }

        .small-info {
            margin-top: 15px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        @media (max-width: 520px) {
            .square-container {
                flex-direction: column;
            }

            #table {
                font-size: 46px;
            }
        }

        @media all and (display-mode: standalone) {
            body {
                padding: 10px;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Gestione Tavoli Sagra</h1>
    <div class="subtitle">Scansione QR e invio dati a Google Sheet</div>

    <div id="reader"></div>

    <div id="connection-status" class="status ready">
        PRONTO ALL'USO
    </div>

    <div class="form-group">
        <label for="date">Data</label>
        <input type="text" id="date" readonly>
    </div>

    <div class="form-group">
        <label for="time">Ora</label>
        <input type="text" id="time" readonly>
    </div>

    <div class="form-group">
        <label for="client">Cliente</label>
        <input type="text" id="client" maxlength="20" readonly>
    </div>

    <div class="form-group">
        <label for="cashdesk">Cassa</label>
        <input type="text" id="cashdesk" maxlength="1" readonly>
    </div>

    <div class="square-container">
        <div class="square-box">
            <div class="square-label">Tavolo</div>
            <div class="square-content">
                <input 
                    type="number" 
                    id="table" 
                    min="1" 
                    max="99" 
                    placeholder="Nr"
                    inputmode="numeric"
                    disabled
                >
            </div>
        </div>

        <div class="square-box">
            <div class="square-label">Note</div>
            <div class="square-content">
                <textarea 
                    id="note" 
                    maxlength="50" 
                    placeholder="Note max 50 caratteri"
                    disabled
                ></textarea>
            </div>
        </div>
    </div>

    <button id="sendData" disabled>INVIA DATI</button>
    <button id="newScan">NUOVA SCANSIONE</button>

    <div class="small-info">
        Formato QR atteso: INI;data;ora;cliente;cassa;END
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>

<script>
    /*
        URL della Web App Google Apps Script.
        Deve essere l'URL che termina con /exec.
    */
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOPC6hg6oA7Hh4LQhfjo64BBxM2lbH1TGsP6mQfcDMymfi0T6P6eXTZ8qZ3P9v7k61aA/exec";

    const statusBox = document.getElementById("connection-status");
    const sendButton = document.getElementById("sendData");
    const newScanButton = document.getElementById("newScan");
    const tableInput = document.getElementById("table");
    const noteInput = document.getElementById("note");

    let scannerStarted = false;
    let html5QrCode = null;
    let lastQrRawText = "";
    let qrReadyToSend = false;
    let isProcessingScan = false;

    function setStatus(message, type) {
        statusBox.textContent = message;
        statusBox.className = "status " + type;
    }

    function abilitaInserimento() {
        tableInput.disabled = false;
        noteInput.disabled = false;
        sendButton.disabled = false;
        qrReadyToSend = true;
    }

    function disabilitaInserimento() {
        tableInput.disabled = true;
        noteInput.disabled = true;
        sendButton.disabled = true;
        qrReadyToSend = false;
    }

    function pulisciCampi() {
        document.getElementById("date").value = "";
        document.getElementById("time").value = "";
        document.getElementById("client").value = "";
        document.getElementById("cashdesk").value = "";
        document.getElementById("table").value = "";
        document.getElementById("note").value = "";

        lastQrRawText = "";
        isProcessingScan = false;

        disabilitaInserimento();
    }

    function validaNumeroTavolo() {
        const tableValue = tableInput.value.trim();

        if (!tableValue) {
            alert("Inserisci il numero del tavolo.");
            return false;
        }

        const tableNumber = Number(tableValue);

        if (Number.isNaN(tableNumber) || tableNumber < 1 || tableNumber > 99) {
            alert("Il numero del tavolo deve essere compreso tra 1 e 99.");
            return false;
        }

        return true;
    }

    function checkCampiObbligatori() {
        const date = document.getElementById("date").value.trim();
        const time = document.getElementById("time").value.trim();
        const client = document.getElementById("client").value.trim();
        const cashdesk = document.getElementById("cashdesk").value.trim();

        if (!date || !time || !client || !cashdesk || !lastQrRawText) {
            alert("Prima devi scansionare un QR code valido.");
            return false;
        }

        if (!qrReadyToSend) {
            alert("Il QR non è ancora pronto per l'invio.");
            return false;
        }

        return true;
    }

    async function startScanner() {
        if (scannerStarted) return;

        try {
            html5QrCode = new Html5Qrcode("reader");

            const cameras = await Html5Qrcode.getCameras();

            if (!cameras || cameras.length === 0) {
                setStatus("NESSUNA FOTOCAMERA TROVATA", "error");
                return;
            }

            let cameraId = cameras[0].id;

            for (const camera of cameras) {
                const label = (camera.label || "").toLowerCase();

                if (
                    label.includes("back") ||
                    label.includes("rear") ||
                    label.includes("environment") ||
                    label.includes("posteriore")
                ) {
                    cameraId = camera.id;
                    break;
                }
            }

            await html5QrCode.start(
                cameraId,
                {
                    fps: 10,
                    qrbox: {
                        width: 250,
                        height: 250
                    }
                },
                onScanSuccess,
                onScanFailure
            );

            scannerStarted = true;
            setStatus("FOTOCAMERA ATTIVA - SCANSIONA IL QR", "ready");

        } catch (error) {
            console.error("Errore scanner:", error);
            setStatus("ERRORE FOTOCAMERA: " + error.message, "error");
        }
    }

    async function stopScanner() {
        if (!html5QrCode || !scannerStarted) return;

        try {
            await html5QrCode.stop();
            await html5QrCode.clear();
            scannerStarted = false;
        } catch (error) {
            console.warn("Errore durante stop scanner:", error);
        }
    }

    function onScanFailure(error) {
        /*
            Gli errori durante la ricerca del QR sono normali.
            Non mostriamo messaggi continui.
        */
    }

    async function controllaQrGiaAcquisito(qrText) {
        const payload = {
            action: "check",
            qrId: qrText
        };

        const response = await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(payload),
            redirect: "follow"
        });

        const rawResponse = await response.text();

        console.log("Risposta controllo QR:", rawResponse);

        let result;

        try {
            result = JSON.parse(rawResponse);
        } catch (error) {
            throw new Error("Risposta non JSON dal controllo QR: " + rawResponse);
        }

        return result;
    }

    async function onScanSuccess(decodedText) {
        if (isProcessingScan) return;
        isProcessingScan = true;

        console.log("QR letto:", decodedText);

        const qrText = decodedText.trim();
        const parts = qrText.split(";");

        if (parts.length !== 6) {
            alert("QR non valido. Numero campi errato.");
            isProcessingScan = false;
            return;
        }

        if (parts[0] !== "INI" || parts[5] !== "END") {
            alert("QR non valido. Deve iniziare con INI e terminare con END.");
            isProcessingScan = false;
            return;
        }

        setStatus("CONTROLLO QR IN CORSO...", "sending");

        try {
            await stopScanner();

            const checkResult = await controllaQrGiaAcquisito(qrText);

            if (checkResult.status === "duplicate") {
                setStatus("QR GIÀ ACQUISITO", "error");

                alert(
                    "ATTENZIONE!\n\n" +
                    "Questo QR code è già stato acquisito.\n\n" +
                    "Cliente: " + (checkResult.cliente || "non disponibile") + "\n" +
                    "Tavolo: " + (checkResult.tavolo || "non disponibile") + "\n" +
                    "Prima acquisizione: " + (checkResult.firstScan || "non disponibile")
                );

                pulisciCampi();
                await startScanner();
                return;
            }

            if (checkResult.status !== "available") {
                throw new Error(checkResult.message || "Risposta controllo QR non valida.");
            }

            lastQrRawText = qrText;

            document.getElementById("date").value = parts[1].trim();
            document.getElementById("time").value = parts[2].trim();
            document.getElementById("client").value = parts[3].trim();
            document.getElementById("cashdesk").value = parts[4].trim();

            abilitaInserimento();

            setStatus("QR VALIDO - INSERISCI TAVOLO E NOTE", "ready");

            tableInput.focus();

        } catch (error) {
            console.error("Errore controllo QR:", error);

            setStatus("ERRORE CONTROLLO QR", "error");

            alert(
                "Errore durante il controllo del QR:\n\n" +
                error.message
            );

            pulisciCampi();
            await startScanner();
        }
    }

    async function inviaDati() {
        if (!checkCampiObbligatori()) return;
        if (!validaNumeroTavolo()) return;

        const tableRaw = tableInput.value.trim();
        const tableFormatted = String(Number(tableRaw)).padStart(2, "0");

        const payload = {
            action: "save",
            data: document.getElementById("date").value.trim(),
            ora: document.getElementById("time").value.trim(),
            cliente: document.getElementById("client").value.trim(),
            cassa: document.getElementById("cashdesk").value.trim(),
            tavolo: tableFormatted,
            note: noteInput.value.trim(),
            qrId: lastQrRawText
        };

        console.log("Payload inviato:", payload);

        sendButton.disabled = true;
        setStatus("INVIO DATI IN CORSO...", "sending");

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(payload),
                redirect: "follow"
            });

            const rawResponse = await response.text();

            console.log("Risposta salvataggio:", rawResponse);

            let result;

            try {
                result = JSON.parse(rawResponse);
            } catch (jsonError) {
                throw new Error("La risposta dello script non è JSON valido: " + rawResponse);
            }

            if (result.status === "success") {
                setStatus("DATI SALVATI CORRETTAMENTE", "ready");

                alert("Dati salvati correttamente nel Google Sheet.");

                pulisciCampi();
                await startScanner();

            } else if (result.status === "duplicate") {
                setStatus("QR GIÀ ACQUISITO", "error");

                alert(
                    "ATTENZIONE!\n\n" +
                    "Questo QR code è già stato acquisito.\n\n" +
                    "Cliente: " + (result.cliente || "non disponibile") + "\n" +
                    "Tavolo: " + (result.tavolo || "non disponibile") + "\n" +
                    "Prima acquisizione: " + (result.firstScan || "non disponibile")
                );

                pulisciCampi();
                await startScanner();

            } else {
                throw new Error(result.message || "Errore sconosciuto nello script Google.");
            }

        } catch (error) {
            console.error("Errore invio:", error);

            setStatus("ERRORE INVIO DATI", "error");

            alert(
                "Errore durante l'invio dei dati:\n\n" +
                error.message
            );

            sendButton.disabled = false;

        }
    }

    sendButton.addEventListener("click", inviaDati);

    newScanButton.addEventListener("click", async () => {
        await stopScanner();
        pulisciCampi();
        setStatus("NUOVA SCANSIONE", "ready");
        await startScanner();
    });

    window.addEventListener("load", async () => {
        pulisciCampi();
        await startScanner();
    });

    /*
        Service Worker disattivato durante i test per evitare problemi di cache.

        Quando tutto funziona stabilmente, potrai riattivarlo togliendo i commenti.
    */

    /*
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("sw.js");
        });
    }
    */
</script>

</body>
</html>
